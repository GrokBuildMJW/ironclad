# Copier template — ACK "new-case" / "new-domain" paved road.
# ---------------------------------------------------------------------------
# A valid Copier questionnaire so `copier copy`/`copier update` work once
# `pip install copier` is present. Copier is intentionally NOT required; the
# canonical driver is `python -m ack.generator`, which renders the same
# `{{ token }}` tree with substitution-only semantics and does the re-runnable
# 3-way merge itself. The CLI mirrors the computed defaults below — keep them in
# sync. See TEMPLATE-README.md.

_subdirectory: "."
_envops:
  keep_trailing_newline: true

# Skip the template's own meta files when rendering.
_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "TEMPLATE-README.md"
  - "~*"
  - ".ack-generator-state.json"

# --- Questions ------------------------------------------------------------- #
domain_name:
  type: str
  help: "Domain key in kebab-case (e.g. todo-api)"
  validator: "{% if not (domain_name | regex_search('^[a-z0-9]+(-[a-z0-9]+)*$')) %}kebab-case only{% endif %}"

domain_folder:
  type: str
  help: "Research subfolder (Title-Case)"
  default: "{{ domain_name.split('-') | map('capitalize') | join('-') }}"

domain_title:
  type: str
  help: "Human-readable domain title"
  default: "{{ domain_name.split('-') | map('capitalize') | join(' ') }}"

case_name:
  type: str
  help: "Case key in kebab-case (e.g. my-feature)"
  validator: "{% if not (case_name | regex_search('^[a-z0-9]+(-[a-z0-9]+)*$')) %}kebab-case only{% endif %}"

case_title:
  type: str
  help: "Human-readable case title"
  default: "{{ case_name.split('-') | map('capitalize') | join(' ') }}"

key_prefix:
  type: str
  help: "Short capability-key prefix (default: domain initials, e.g. ta)"
  default: "{{ domain_name.split('-') | map('first') | join('') }}"

capability_key:
  type: str
  help: "Capability key used by the ack.lodestar.tracking join"
  default: "{{ key_prefix }}-{{ case_name }}"
  when: false

description:
  type: str
  help: "One-line description of the case"

phase:
  type: str
  default: "MVP"
  choices: ["MVP", "V1", "V2", "V3", "out-of-scope"]

tier:
  type: str
  default: "high"
  choices: ["high", "medium", "low"]

type:
  type: str
  help: "Task type"
  default: "implementation"

assignee:
  type: str
  default: "claude-opus-4-8"

effort:
  type: str
  default: "high"
  choices: ["low", "medium", "high", "xhigh"]

non_negotiable_flag:
  type: bool
  help: "Is this capability non-negotiable?"
  default: false

# TPL-1/TPL-2 (#503): the rendered tree references {{date}} + {{tags_yaml}}/{{tags_csv}} and embeds
# {{non_negotiable}} INSIDE a JSON object — values the canonical `ack.generator` CLI fills via
# build_context. Declare them here too (computed, when:false) so a raw `copier copy` produces VALID
# frontmatter/JSON, mirroring build_context. `non_negotiable` renders a LOWERCASE json string — a copier
# `bool` would emit `True`/`False` and break the gap-tracking JSON.
non_negotiable:
  type: str
  default: "{{ 'true' if non_negotiable_flag else 'false' }}"
  when: false

tags:
  type: str
  help: "Comma-separated frontmatter tags"
  default: "tracking, {{ domain_name }}, planning, gx10"

tags_csv:
  type: str
  default: "{{ tags.split(',') | map('trim') | select | join(', ') }}"   # select drops empties, mirroring build_context's `if t.strip()`
  when: false

tags_yaml:
  type: str
  default: "[{{ tags.split(',') | map('trim') | select | join(', ') }}]"
  when: false

date:
  type: str
  help: "ISO date YYYY-MM-DD (the ack.generator CLI auto-fills today; copier leaves it empty unless given)"
  default: ""
