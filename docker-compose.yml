# Ironclad reference stack — one `docker compose up` for the model + orchestrator.
#
#   # orchestrator only (connect to a model you already run):
#   GX10_BASE_URL=http://localhost:8000/v1 GX10_MODEL=qwen3.6-35b docker compose up -d
#
#   # model + orchestrator together (needs a GPU + the NVIDIA container runtime):
#   IRONCLAD_MODEL_DIR=~/models/RedHatAI-Qwen3.6-35B-A3B-NVFP4 \
#     docker compose --profile model up -d
#
# Host networking so the orchestrator reaches the model on localhost and binds :8100
# on the host (same trust model as the model port — home LAN). Secret-free: hosts,
# model dir and language come from env (with sensible defaults), nothing baked in.
#
# Long-term memory (Mem0) ships under the `memory` profile (Qdrant + Neo4j + a Mem0
# API). Bring it up and point the orchestrator at it:
#   NEO4J_PASSWORD=change-me GX10_MEMORY_URL=http://localhost:8800 \
#     docker compose --profile model --profile memory up -d
services:
  # Model server (vLLM). Only started with `--profile model`; otherwise bring your own
  # OpenAI-compatible endpoint and run just the orchestrator.
  vllm:
    profiles: ["model"]
    image: ${IRONCLAD_VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
    container_name: vllm
    network_mode: host
    ipc: host
    restart: unless-stopped
    volumes:
      - ${IRONCLAD_MODEL_DIR:-./models}:/model:ro
    command: >
      /model
      --served-model-name ${GX10_MODEL:-qwen3.6-35b}
      --quantization compressed-tensors --kv-cache-dtype fp8
      --attention-backend flashinfer --moe-backend flashinfer_cutlass
      --tensor-parallel-size 1 --gpu-memory-utilization ${IRONCLAD_GPU_MEM_UTIL:-0.6}
      --max-model-len ${IRONCLAD_MAX_MODEL_LEN:-32768} --max-num-seqs ${IRONCLAD_MAX_SEQS:-8}
      --enable-chunked-prefill --enable-prefix-caching
      --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/v1/models"]
      interval: 10s
      timeout: 5s
      retries: 60          # cold start loads weights into VRAM — can take minutes
      start_period: 30s

  orchestrator:
    build: .
    image: ironclad-orchestrator
    container_name: ironclad-orchestrator
    network_mode: host          # reach vLLM on localhost:8000, bind 8100 on the host
    restart: unless-stopped
    depends_on:
      vllm:
        condition: service_healthy
        required: false         # only waited on when the `model` profile is active
    environment:
      GX10_BASE_URL: ${GX10_BASE_URL:-http://localhost:8000/v1}
      GX10_MODEL: ${GX10_MODEL:-qwen3.6-35b}
      GX10_SERVER_PORT: ${GX10_SERVER_PORT:-8100}
      GX10_LANGUAGE: ${GX10_LANGUAGE:-en}
      GX10_MEMORY_URL: ${GX10_MEMORY_URL:-}
      # Warm tier (B0): the host-network orchestrator reaches the mem-valkey loopback publish at
      # localhost:6379 → wired automatically under `--profile memory`. Fail-soft: with valkey absent
      # the tier is a no-op (one failed connect, then disabled). Override/disable via GX10_WARM_URL.
      GX10_WARM_URL: ${GX10_WARM_URL:-redis://localhost:6379}
      GX10_WORKDIR: /work
    volumes:
      - ./ironclad-workdir:/work   # engine state → .ironclad/, artifacts → vault/<slug>/ (persist on the host)

  # --- Long-term memory (Mem0) — started with `--profile memory` -------------
  # Then also set GX10_MEMORY_URL=http://localhost:8800 so the orchestrator uses it.
  qdrant:
    profiles: ["memory"]
    image: qdrant/qdrant:latest
    container_name: mem-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage

  neo4j:
    profiles: ["memory"]
    image: neo4j:5.26.4
    container_name: mem-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ironclad-memory}
      NEO4J_PLUGINS: '["apoc"]'        # Mem0 graph memory needs APOC
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  memory-api:
    profiles: ["memory"]
    build: ./memory-service
    image: ironclad-memory-api
    container_name: mem-api
    restart: unless-stopped
    ports:
      - "8800:8000"                    # orchestrator reaches it at localhost:8800
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach the host-network vLLM from this bridge container
    environment:
      # memory-api runs on the bridge network → reach the host's model via host-gateway,
      # not localhost. Override with MEM0_LLM_BASE_URL if your endpoint is elsewhere.
      MEM0_LLM_BASE_URL: ${MEM0_LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      MEM0_LLM_MODEL: ${GX10_MODEL:-qwen3.6-35b}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-ironclad-memory}
      NEO4J_URL: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      HF_HOME: /hf-cache               # cache BGE-M3 weights
    volumes:
      - hf-cache:/hf-cache
    depends_on:
      - qdrant
      - neo4j
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s                # first boot downloads BGE-M3

  # --- Warm tier (Valkey) — short-term session state + retrieval cache (B0) ----
  # Valkey (BSD-3, Linux-Foundation fork of Redis 7.2) — NOT the Redis server (RSALv2/SSPL).
  valkey:
    profiles: ["memory"]
    image: valkey/valkey:8-alpine
    container_name: mem-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "127.0.0.1:6379:6379"          # loopback only — the host orchestrator reaches it, never the LAN
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 30

volumes:
  qdrant-data:
  neo4j-data:
  neo4j-logs:
  valkey-data:
  hf-cache:
