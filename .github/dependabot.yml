# Dependency update automation for the published Ironclad repo (this file is exported from
# .github/dependabot.yml → the public repo's .github/dependabot.yml). Proposes weekly
# update PRs for the Python package, the bundled ink client, and the GitHub Actions used in CI;
# the CI `dependency-audit` job surfaces known CVEs so a proposed bump has a clear reason.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"                     # the Python package (pyproject.toml) at the export root
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/clients/ink"          # the bundled terminal client
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "github-actions"
    directory: "/"                     # keep the CI action versions current
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
