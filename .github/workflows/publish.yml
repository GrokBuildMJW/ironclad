name: Publish to PyPI

# Builds the package on every published GitHub release and uploads it to PyPI —
# but ONLY if a PYPI_API_TOKEN secret is configured. Until then the upload step is
# skipped (no failing runs). To enable: create a PyPI API token and add it as the
# repo secret `PYPI_API_TOKEN`.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload to PyPI (if token is set)
        env:
          TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        if: ${{ env.TOKEN != '' }}
        run: |
          python -m pip install twine
          python -m twine upload --non-interactive -u __token__ -p "$TOKEN" dist/*
