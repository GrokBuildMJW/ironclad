name: clean-room

# Public-release gate (#58). Prove the package installs and runs **from the published
# sources in isolation** — catching forgotten runtime deps / missing files before a user
# trips over them. Never trust "works in the monorepo".
#
#   PRE-publish  (PRs / pushes): build the wheel from THIS repo, install it into a fresh
#                venv (NOT `-e`, not the source tree), import-smoke from a neutral dir, and
#                resolve the optional extras; plus a fresh `clients/ink` build + test.
#   POST-publish (on a published GitHub Release): install the REAL package from PyPI and
#                import-smoke — proves what users actually get.
#
# Rollback runbook (manual, if POST-publish fails): yank the bad version on PyPI
# (`pip`-side) and mark the GitHub Release as a draft/pre-release; the previous version
# stays installable. See PROJECT_SETUP.md → release model.

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-publish-python:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build the wheel from the published sources
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the wheel into a fresh venv (not -e, not the repo)
        run: |
          python -m venv /tmp/cr
          /tmp/cr/bin/python -m pip install --upgrade pip
          /tmp/cr/bin/python -m pip install dist/*.whl
      - name: Import-smoke from a neutral dir (installed package, not the source tree)
        run: cd /tmp && /tmp/cr/bin/python -c "import ack, ack.lodestar, ack.sdk; print('import OK ->', ack.__file__, '| sdk exports:', len(ack.sdk.__all__))"
      - name: Orchestrator-surface proof (#994-S1 — the published wheel is orchestrator-capable, fail-closed)
        # Prove the wheel ships the dev-process orchestration facade the self-hosting orchestrator drives
        # through (stable verbs over a driver seam) AND that it fail-closes without a driver — from the
        # INSTALLED wheel in a neutral dir, so a self-mod that breaks/omits the surface blocks the release.
        run: |
          cd /tmp && /tmp/cr/bin/python - <<'PY'
          import ack.devprocess.api as api, ack.sdk as sdk
          verbs = ("select_unit", "stage_handover", "record_feedback", "advance", "deliver",
                   "set_driver", "get_driver")
          missing = [v for v in verbs if not hasattr(api, v)]
          assert not missing, f"wheel is missing dev-process orchestration verbs: {missing}"
          assert api.get_driver() is None, "the wheel must ship NO driver by default (the extension wires it)"
          try:
              api.advance("t", "a")
              raise SystemExit("FAIL: advance() did not fail-closed without a driver")
          except api.SubstrateUnavailable:
              pass  # correct: the orchestration facade fail-closes when no driver is registered
          assert callable(sdk.gate), "the wheel must ship a callable ack.sdk.gate"
          print("orchestrator-surface OK -> verbs present, fail-closed without a driver, sdk.gate callable")
          PY
      - name: Optional extras resolve (catch forgotten dependency declarations)
        run: /tmp/cr/bin/python -m pip install "ironclad-ai[engine,memory]" --find-links dist
      - name: Build the example plugin against the installed SDK + verify discovery (#138)
        run: |
          /tmp/cr/bin/python -m pip install --no-deps ./examples/example-plugin
          cd /tmp && /tmp/cr/bin/python - <<'PY'
          import ack.sdk
          from importlib.metadata import entry_points
          from pathlib import Path
          import importlib.util as u
          eps = [e for e in entry_points(group="ironclad.plugins") if e.name == "example"]
          assert eps, "example plugin did not register the ironclad.plugins entry point"
          import ironclad_example_plugin as p
          skill = Path(p.__path__[0]) / "skills" / "reverse.py"
          spec = u.spec_from_file_location("rev", skill); m = u.module_from_spec(spec); spec.loader.exec_module(m)
          assert m.run("hello") == "olleh"
          schema = ack.sdk.derive_tool_schema(m.run)
          assert "text" in schema["properties"], schema
          print("example plugin builds against the SDK, registers its entry point, runs, schema OK")
          PY

  pre-publish-ink:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    # #448: stays SINGLE-Node (the engines minimum, 22) because this job is a BRANCH-PROTECTION required
    # check — matrixing it would rename the check to `pre-publish-ink (22|24)` and require a coordinated
    # live-protection + SSOT update (operator-gated). The per-change Node 22↔24 validation lives in the
    # private `node-client.yml` matrix, which runs on every `clients/ink` change (incl. the desktop rebuild).
    defaults:
      run:
        working-directory: clients/ink
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fresh install + build + test (catch missing npm deps / build artifacts)
        run: |
          npm ci
          npm run build
          npm test

  post-publish-smoke:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the published package from PyPI + import-smoke (with propagation retry)
        env:
          TAG: ${{ github.ref_name }}
          # #413: install from the SAME index the release published to. Unset -> production PyPI (default).
          # A Test-PyPI proof repo sets PYPI_REPOSITORY_URL (the legacy/upload URL); derive the simple index
          # and add production as an --extra-index-url so the package comes from Test-PyPI but its
          # dependencies (which live only on production PyPI) still resolve.
          PYPI_REPOSITORY_URL: ${{ vars.PYPI_REPOSITORY_URL }}
        run: |
          python -m pip install --upgrade pip
          version="${TAG#v}"
          index_args=""
          if [ -n "${PYPI_REPOSITORY_URL:-}" ]; then
            simple="${PYPI_REPOSITORY_URL%/legacy/}/simple/"
            index_args="--index-url ${simple} --extra-index-url https://pypi.org/simple/"
            echo "installing ironclad-ai==${version} from ${simple} (+ pypi.org for deps)"
          fi
          for attempt in $(seq 1 10); do
            if python -m pip install ${index_args} "ironclad-ai==${version}"; then
              ok=1; break
            fi
            echo "index not propagated yet (attempt ${attempt}/10) — waiting 30s..."
            sleep 30
          done
          [ "${ok:-0}" = "1" ] || { echo "::error::ironclad-ai==${version} never appeared on the index"; exit 1; }
          cd /tmp && python -c "import ack, ack.lodestar, ack.sdk; print('PyPI install OK ->', ack.__file__, '| sdk exports:', len(ack.sdk.__all__))"
      - name: Orchestrator-surface proof on the RELEASED wheel (#994-S2 — the shipped artifact is orchestrator-capable)
        # Post-publish counterpart of the pre-publish proof (#994-S1): prove the package users actually got
        # FROM THE INDEX (test-PyPI first, then production) carries the dev-process orchestration facade +
        # fail-closes without a driver — closing the "untested on the released artifact" gap of the
        # self-hosting bootstrap.
        run: |
          cd /tmp && python - <<'PY'
          import ack.devprocess.api as api, ack.sdk as sdk
          verbs = ("select_unit", "stage_handover", "record_feedback", "advance", "deliver",
                   "set_driver", "get_driver")
          missing = [v for v in verbs if not hasattr(api, v)]
          assert not missing, f"released wheel is missing dev-process orchestration verbs: {missing}"
          assert api.get_driver() is None, "the released wheel must ship NO driver by default"
          try:
              api.advance("t", "a")
              raise SystemExit("FAIL: advance() did not fail-closed without a driver")
          except api.SubstrateUnavailable:
              pass  # correct: the released orchestration facade fail-closes when no driver is registered
          assert callable(sdk.gate), "the released wheel must ship a callable ack.sdk.gate"
          print("released-artifact orchestrator-surface OK -> verbs present, fail-closed, sdk.gate callable")
          PY
