name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[engine]" pytest
      - name: Tests
        run: python -m pytest ack/tests skills/mpr -q   # core kernel + the bundled MPR plugin

  secret-scan:
    # The public tree must be secret-free even if someone edits it directly (the export's private
    # secret-gate can't see a hand-push to this repo). Fail-closed: gitleaks must install AND pass.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version   # >=8.19 for the `gitleaks dir` subcommand
      - name: gitleaks (secret scan)
        run: gitleaks dir . --no-banner --redact
