name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[engine]" pytest
      - name: Tests
        run: python -m pytest ack/tests skills/mpr -q   # core kernel + the bundled MPR plugin

  secret-scan:
    # The public tree must be secret-free even if someone edits it directly (the export's private
    # secret-gate can't see a hand-push to this repo). Fail-closed: gitleaks must install AND pass.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version   # >=8.19 for the `gitleaks dir` subcommand
      - name: gitleaks (secret scan)
        run: gitleaks dir . --no-banner --redact

  dependency-audit:
    # Surface known CVEs in the shipped dependencies (pip-audit for the Python package, npm audit for the
    # bundled ink client); dependabot (.github/dependabot.yml) proposes the fixes. ADVISORY (continue-on-error)
    # so a newly-disclosed transitive CVE surfaces in the log without blocking unrelated PRs — NOT a required
    # check. Tighten to blocking once a triaged baseline / ignore-list is established.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (Python deps)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e ".[engine]"
          pip-audit --strict --desc
      - name: npm audit (ink client)
        continue-on-error: true
        working-directory: clients/ink
        run: |
          npm ci --ignore-scripts || npm install --ignore-scripts
          npm audit --audit-level=high
